  <!-- ═════════════════
      SPLASH START
  ══════════════════ -->
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      background: #000;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* ══════════════════════════════════════════════
       SPLASH WRAPPER
    ══════════════════════════════════════════════ */
    #sp {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: opacity;
      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sp.out {
      opacity: 0;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════════
       KEYFRAMES
       All use transform + opacity only — GPU layer,
       zero layout/paint cost on any device.
    ══════════════════════════════════════════════ */

    /* Background */
    @keyframes bgFade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* Blobs */
    @keyframes blob1 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(.80);
        opacity: .17
      }

      50% {
        transform: translate(-50%, -50%) scale(1.24);
        opacity: .52
      }
    }

    @keyframes blob2 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(.86);
        opacity: .13
      }

      50% {
        transform: translate(-50%, -50%) scale(1.30);
        opacity: .46
      }
    }

    @keyframes blob3 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(.76);
        opacity: .11
      }

      50% {
        transform: translate(-50%, -50%) scale(1.20);
        opacity: .40
      }
    }

    @keyframes orbit {
      from {
        transform: translate(-50%, -50%) rotate(0deg)
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg)
      }
    }

    /* Icon */
    @keyframes logoDrop {
      0% {
        opacity: 0;
        transform: translateY(-150px) scale(.68);
      }

      52% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      65% {
        transform: translateY(0) scaleX(1.22) scaleY(.72);
      }

      78% {
        transform: translateY(-42px) scaleX(.84) scaleY(1.32);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bounce2 {
      0% {
        transform: translateY(0) scale(1);
      }

      22% {
        transform: translateY(0) scaleX(1.11) scaleY(.83);
      }

      58% {
        transform: translateY(-20px) scaleX(.91) scaleY(1.17);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @keyframes shadowA {
      0% {
        transform: translateX(-50%) scaleX(.22);
        opacity: 0;
      }

      52% {
        transform: translateX(-50%) scaleX(1);
        opacity: .55;
      }

      65% {
        transform: translateX(-50%) scaleX(1.35);
        opacity: .25;
      }

      78% {
        transform: translateX(-50%) scaleX(.66);
        opacity: .42;
      }

      100% {
        transform: translateX(-50%) scaleX(1);
        opacity: .55;
      }
    }

    @keyframes shine {
      from {
        left: -42%
      }

      to {
        left: 148%
      }
    }

    /* kept for reference */

    /* Text + separator */
    @keyframes lineSweep {
      from {
        transform: scaleX(0);
        opacity: 0
      }

      to {
        transform: scaleX(1);
        opacity: 1
      }
    }

    @keyframes dotRing {
      0% {
        transform: scale(1);
        opacity: .70
      }

      100% {
        transform: scale(2.6);
        opacity: 0
      }
    }

    @keyframes tagReveal {
      from {
        opacity: 0;
        transform: translateY(26px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes subFade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* Brand stripe */
    @keyframes stripeIn {
      from {
        opacity: 0;
        transform: scaleX(0)
      }

      to {
        opacity: 1;
        transform: scaleX(1)
      }
    }

    /* Loading */
    @keyframes dBounce {

      0%,
      100% {
        transform: scaleY(.28);
        opacity: .40
      }

      50% {
        transform: scaleY(1);
        opacity: 1
      }
    }

    @keyframes dc1 {

      0%,
      100% {
        background: #BAFA34
      }

      50% {
        background: #00E5FF
      }
    }

    @keyframes dc2 {

      0%,
      100% {
        background: #00E5FF
      }

      50% {
        background: #792BEC
      }
    }

    @keyframes dc3 {

      0%,
      100% {
        background: #792BEC
      }

      50% {
        background: #EC2B4E
      }
    }

    @keyframes dc4 {

      0%,
      100% {
        background: #EC2B4E
      }

      50% {
        background: #BAFA34
      }
    }

    @keyframes dc5 {

      0%,
      100% {
        background: #FF6D00
      }

      50% {
        background: #6EBE6B
      }
    }

    @keyframes stripShim {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes dotsFade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes verFade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* ══════════════════════════════════════════════
       BACKGROUND
    ══════════════════════════════════════════════ */
    #sp-bg {
      position: absolute;
      inset: 0;
      background: #000;
      animation: bgFade 500ms ease both;
    }

    /* ── Orbit ring holds the 3 blobs ── */
    #sp-orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(160vmin, 900px);
      height: min(160vmin, 900px);
      animation: orbit 9s linear infinite;
    }

    .sp-blob {
      position: absolute;
      border-radius: 50%;
    }

    #sp-b1 {
      width: min(80vmin, 520px);
      height: min(80vmin, 520px);
      top: 6%;
      left: 10%;
      background: radial-gradient(circle, rgba(186, 250, 52, .50) 0%, rgba(186, 250, 52, .12) 50%, transparent 72%);
      animation: blob1 2.4s ease-in-out infinite;
    }

    #sp-b2 {
      width: min(72vmin, 480px);
      height: min(72vmin, 480px);
      top: 46%;
      right: 4%;
      background: radial-gradient(circle, rgba(121, 43, 236, .50) 0%, rgba(121, 43, 236, .12) 50%, transparent 72%);
      animation: blob2 3.0s ease-in-out .5s infinite;
    }

    #sp-b3 {
      width: min(66vmin, 440px);
      height: min(66vmin, 440px);
      bottom: 6%;
      left: 16%;
      background: radial-gradient(circle, rgba(0, 229, 255, .48) 0%, rgba(0, 229, 255, .12) 50%, transparent 72%);
      animation: blob3 3.6s ease-in-out 1.0s infinite;
    }

    /* ── Vignette ── */
    #sp-vig {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 85% 90% at 50% 50%,
          transparent 10%, rgba(0, 0, 0, .80) 56%, rgba(0, 0, 0, .97) 100%);
    }

    /* ══════════════════════════════════════════════
       TOP BRAND STRIPE
    ══════════════════════════════════════════════ */
    #sp-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: clamp(2px, .28vmin, 3px);
      background: linear-gradient(to right, transparent 0%, #BAFA34 38%, #00E5FF 62%, transparent 100%);
      transform-origin: center;
      animation: stripeIn 500ms ease 1.25s both;
    }

    /* ══════════════════════════════════════════════
       CONTENT COLUMN
    ══════════════════════════════════════════════ */
    #sp-col {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(env(safe-area-inset-top, 16px), 16px) 24px max(env(safe-area-inset-bottom, 16px), 16px);
    }

    /* ══════════════════════════════════════════════
       ICON AREA
    ══════════════════════════════════════════════ */
    #sp-logo-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* width matches the icon so shadow/burst position correctly */
      width: clamp(120px, 30vmin, 280px);
    }

    /*
     * BURST RING — not in the HTML at all.
     * Created and appended by JS at exactly 1020ms.
     * This completely eliminates the CSS delay/fill-mode flash.
     */
    .sp-burst-el {
      position: absolute;
      top: 50%;
      left: 50%;
      width: clamp(120px, 30vmin, 280px);
      height: clamp(56px, 14vmin, 132px);
      transform: translate(-50%, -50%) scale(0.86);
      border: 2.5px solid rgba(186, 250, 52, .86);
      border-radius: clamp(12px, 3vmin, 28px);
      pointer-events: none;
      animation: burstGo 380ms ease-out forwards;
    }

    @keyframes burstGo {
      0% {
        transform: translate(-50%, -50%) scale(0.86);
        opacity: 0.82;
      }

      100% {
        transform: translate(-50%, -50%) scale(2.60);
        opacity: 0;
      }
    }

    /* Shadow — starts truly invisible via opacity:0, fill-mode:both
       keeps the FROM state (opacity:0) active during the delay */
    #sp-shadow {
      position: absolute;
      bottom: clamp(-14px, -2vmin, -8px);
      left: 50%;
      width: 68%;
      height: clamp(10px, 1.5vmin, 14px);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(186, 250, 52, .56) 0%, transparent 72%);
      opacity: 0;
      animation: shadowA 900ms cubic-bezier(.34, 1.56, .64, 1) .24s both;
    }

    /* Icon wrappers — p2 wraps p1 for two animation phases */
    #sp-p2 {
      transform-origin: bottom center;
      /* bounce2 starts at scale(1) so no visible flash during delay */
      animation: bounce2 320ms ease-in-out 1.12s both;
    }

    #sp-p1 {
      width: clamp(120px, 30vmin, 280px);
      position: relative;
      /* NO overflow:hidden — that was clipping and revealing a dark bg rect */
      /* NO border-radius on the wrapper — icon itself has rounded corners */
      transform-origin: bottom center;
      opacity: 0;
      /* fill-mode:both keeps opacity:0 during the .24s delay */
      animation: logoDrop 900ms cubic-bezier(.34, 1.56, .64, 1) .24s both;
    }

    #sp-p1 img {
      width: 100%;
      display: block;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Shine — injected by JS at 640ms, same JS pattern as burst ring */
    .sp-shine-el {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 24%;
      background: linear-gradient(to right,
          transparent,
          rgba(255, 255, 255, .38) 35%,
          rgba(255, 255, 255, .58) 50%,
          rgba(255, 255, 255, .38) 65%,
          transparent);
      transform: skewX(-18deg);
      animation: shineGo 400ms ease-in-out forwards;
    }

    @keyframes shineGo {
      from {
        left: -42%;
      }

      to {
        left: 148%;
      }
    }

    /* ══════════════════════════════════════════════
       SEPARATOR
    ══════════════════════════════════════════════ */
    #sp-sep {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vmin, 16px);
      margin-top: clamp(24px, 5.5vmin, 56px);
      animation: dotsFade 400ms ease 1.32s both;
    }

    .sp-sep-line {
      width: clamp(40px, 11vmin, 100px);
      height: 1px;
      transform-origin: right;
      animation: lineSweep 500ms ease 1.34s both;
    }

    #sp-sl {
      background: linear-gradient(to right, transparent, #BAFA34);
      transform-origin: right;
    }

    #sp-sr {
      background: linear-gradient(to left, transparent, #BAFA34);
      transform-origin: left;
    }

    #sp-dot-wrap {
      position: relative;
      width: clamp(10px, 2vmin, 16px);
      height: clamp(10px, 2vmin, 16px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sp-dot-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(186, 250, 52, .70);
      animation: dotRing 1.8s ease-out 1.6s infinite;
    }

    #sp-dot-core {
      width: clamp(6px, 1.3vmin, 10px);
      height: clamp(6px, 1.3vmin, 10px);
      border-radius: 50%;
      background: #BAFA34;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       TAGLINE
    ══════════════════════════════════════════════ */
    #sp-tag {
      margin-top: clamp(14px, 3vmin, 28px);
      text-align: center;
      padding: 0 clamp(12px, 4vw, 40px);
      animation: tagReveal 700ms cubic-bezier(.22, 1, .36, 1) 1.38s both;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
        'Segoe UI', sans-serif;
    }

    .sp-tag-line {
      display: block;
      font-size: clamp(20px, 4.8vmin, 46px);
      font-weight: 700;
      letter-spacing: -.3px;
      line-height: 1.22;
      color: #fff;
    }

    /* "Everything." and "Nothing." get the lime→cyan gradient */
    .sp-grad {
      background: linear-gradient(90deg, #BAFA34, #00E5FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #sp-sub {
      display: block;
      margin-top: clamp(8px, 1.8vmin, 16px);
      font-size: clamp(9px, 1.8vmin, 13px);
      font-weight: 400;
      letter-spacing: clamp(2.5px, .6vmin, 4px);
      color: rgba(255, 255, 255, .36);
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      animation: subFade 500ms ease 1.96s both;
    }

    /* ══════════════════════════════════════════════
       LOADING DOTS
    ══════════════════════════════════════════════ */
    #sp-dots {
      display: flex;
      align-items: flex-end;
      gap: clamp(6px, 1.2vmin, 12px);
      height: clamp(18px, 3vmin, 26px);
      margin-top: clamp(28px, 6vmin, 60px);
      animation: dotsFade 400ms ease 2.0s both;
    }

    .sp-dot {
      width: clamp(6px, 1.2vmin, 10px);
      border-radius: clamp(3px, .6vmin, 5px);
      transform-origin: bottom;
    }

    .sd1 {
      height: clamp(6px, 1.2vmin, 10px);
      animation: dBounce 1.1s ease-in-out 0ms infinite, dc1 2s linear 0ms infinite;
    }

    .sd2 {
      height: clamp(6px, 1.2vmin, 10px);
      animation: dBounce 1.1s ease-in-out 220ms infinite, dc2 2s linear -.4s infinite;
    }

    .sd3 {
      height: clamp(6px, 1.2vmin, 10px);
      animation: dBounce 1.1s ease-in-out 440ms infinite, dc3 2s linear -.8s infinite;
    }

    .sd4 {
      height: clamp(6px, 1.2vmin, 10px);
      animation: dBounce 1.1s ease-in-out 660ms infinite, dc4 2s linear -1.2s infinite;
    }

    .sd5 {
      height: clamp(6px, 1.2vmin, 10px);
      animation: dBounce 1.1s ease-in-out 880ms infinite, dc5 2s linear -1.6s infinite;
    }

    /* ══════════════════════════════════════════════
       BOTTOM PROGRESS SHIMMER
    ══════════════════════════════════════════════ */
    #sp-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: clamp(2px, .3vmin, 3px);
      overflow: hidden;
      animation: dotsFade 300ms ease 2.1s both;
    }

    #sp-bar-inner {
      height: 100%;
      width: 60%;
      background: linear-gradient(to right, #6EBE6B, #BAFA34, #00E5FF, #BAFA34, #6EBE6B);
      background-size: 200% auto;
      animation: stripShim 1.8s linear infinite;
    }

    /* ── Version ── */
    #sp-ver {
      position: absolute;
      bottom: max(clamp(10px, 1.8vmin, 20px), env(safe-area-inset-bottom, 10px));
      font-size: clamp(8px, 1.2vmin, 11px);
      letter-spacing: clamp(1px, .3vmin, 2px);
      color: rgba(255, 255, 255, .16);
      font-family: -apple-system, sans-serif;
      animation: verFade 400ms ease 2.2s both;
    }
  </style>
  <!-- ═════════════════
      SPLASH END
  ══════════════════ -->
</head>

<body>

  <!-- ═════════════════
      SPLASH REMOVAL
  ══════════════════ -->
  <script>
    (function () {

      var wrap = document.getElementById('sp-icon-wrap');
      var shade = document.getElementById('sp-shadow');
      var area = document.getElementById('sp-logo-area');
      var sep = document.getElementById('sp-sep');
      var tag = document.getElementById('sp-tag');
      var sub = document.getElementById('sp-sub');
      var dots = document.getElementById('sp-dots');
      var bar = document.getElementById('sp-bar');
      var ver = document.getElementById('sp-ver');
      var stripe = document.getElementById('sp-stripe');

      /* ── 240ms: start drop ──────────────────────────────────────── */
      setTimeout(function () {
        wrap.style.opacity = '';          // remove inline opacity:0
        wrap.classList.add('drop');        // triggers logoDrop keyframe
        shade.classList.add('go');         // triggers shadowIn keyframe
      }, 240);

      /* ── 640ms: inject shine inside icon wrap ───────────────────── */
      setTimeout(function () {
        wrap.style.overflow = 'hidden';    // clip shine to icon bounds
        var shine = document.createElement('div');
        shine.className = 'sp-shine';
        shine.style.position = 'absolute';
        shine.style.top = '0';
        shine.style.bottom = '0';
        wrap.appendChild(shine);
        setTimeout(function () {
          if (shine.parentNode) shine.parentNode.removeChild(shine);
          wrap.style.overflow = '';
        }, 420);
      }, 640);

      /* ── 1000ms: inject burst ring ──────────────────────────────── */
      /* Created fresh, appended, auto-removed — zero pre-paint flash */
      setTimeout(function () {
        var img = wrap.querySelector('img');
        if (!img) return;
        var iw = img.offsetWidth || 200;
        var ih = img.offsetHeight || 200;

        var burst = document.createElement('div');
        burst.className = 'sp-burst';
        burst.style.width = iw + 'px';
        burst.style.height = ih + 'px';
        area.appendChild(burst);

        setTimeout(function () {
          if (burst.parentNode) burst.parentNode.removeChild(burst);
        }, 400);
      }, 1000);

      /* ── 1120ms: jump 2 ─────────────────────────────────────────── */
      setTimeout(function () {
        /* Remove drop class, force reflow, add jump2 */
        wrap.classList.remove('drop');
        void wrap.offsetWidth;             // force reflow
        wrap.classList.add('jump2');
        setTimeout(function () {
          wrap.classList.remove('jump2');
        }, 340);
      }, 1120);

      /* ── 1280ms: separator ─────────────────────────────────────── */
      setTimeout(function () {
        sep.classList.add('go');
      }, 1280);

      /* ── 1380ms: tagline ────────────────────────────────────────── */
      setTimeout(function () {
        tag.classList.add('go');
      }, 1380);

      /* ── 1900ms: subtitle ───────────────────────────────────────── */
      setTimeout(function () {
        sub.classList.add('go');
      }, 1900);

      /* ── 1950ms: brand stripe ───────────────────────────────────── */
      setTimeout(function () {
        stripe.style.animation = 'stripeIn 500ms ease both';
      }, 1950);

      /* ── 2050ms: dots, bar, version ─────────────────────────────── */
      setTimeout(function () {
        dots.classList.add('go');
        bar.classList.add('go');
        ver.classList.add('go');
      }, 2050);

      /* ── Splash removal ─────────────────────────────────────────── */
      var removed = false;

      function hide() {
        if (removed) return;
        removed = true;
        var sp = document.getElementById('sp');
        if (!sp) return;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            sp.classList.add('out');
            setTimeout(function () {
              if (sp && sp.parentNode) sp.parentNode.removeChild(sp);
            }, 750);
          });
        });
      }

      window.addEventListener('flutter-first-frame', hide);
      window.addEventListener('flutter-initialized', function () { setTimeout(hide, 200); });
      setTimeout(hide, 10000);

    }());
  </script>
